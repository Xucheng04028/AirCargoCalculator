<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>货代成本计算器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;transition:all .3s}
html{font-size:clamp(12px,3vw,16px)}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;max-width:900px;margin:0 auto;padding:2rem 1.5rem;min-height:100vh;display:flex;flex-direction:column;position:relative;background:#f8f9fa;color:#2d3748}
.theme-toggle{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;font-size:.9rem;cursor-pointer;padding:.5rem .8rem;border-radius:4px;color:#94a3b8}
.theme-toggle:hover{background:rgba(0,0,0,.05)}
h1{margin:0 0 2.5rem;padding-bottom:.8rem;font-size:2.2rem;color:#1e40af}
.calculator{border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.05);padding:2rem;margin-bottom:2rem;border:1px solid #f1f5f9;background:#fff}
.section-title{font-weight:bold;margin:2rem 0 1.2rem;padding-top:1rem;font-size:1.25rem;display:flex;align-items:center;gap:.5rem;border-top:1px dashed #e2e8f0;color:#1e40af}
.section-title:first-of-type{margin-top:0;padding-top:0;border-top:none}
.section-title::before{content:"•";font-size:1.5rem}
table{width:100%;border-collapse:collapse;margin:1.2rem 0}
th,td{border:1px solid #e2e8f0;padding:.9rem;font-size:1rem}
th{background:#f8fafc;color:#4a5568;white-space:nowrap}
input{padding:.6rem .4rem;border:1px solid #cbd5e0;border-radius:6px;width:100%}
input:focus{border-color:#1e40af;box-shadow:0 0 0 3px rgba(30,64,175,.1);outline:none}
.quantity-input input{width:50px}
.dim-length input,.dim-width input,.dim-height input{width:80px}
.volume-container{margin-top:1rem}
.dimension-group{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem;padding:1rem;border-radius:8px;flex-wrap:wrap;border:1px solid #e2e8f0;background:#f8fafc}
.dimension-group button{padding:.7rem .9rem;min-width:65px;background:#e74c3c;color:#fff;border:none;border-radius:6px;cursor:pointer}
.button-group{display:flex;gap:1rem;margin:1rem 0}
.add-btn{background:#2ecc71}
.calculate-btn{background:#1e40af}
button{color:#fff;border:none;padding:.8rem;border-radius:6px;cursor:pointer;font-size:1rem;font-weight:500}
.empty-tip{font-size:.95rem;margin:.8rem 0;padding:1.2rem;border-radius:8px;border:1px dashed #e2e8f0;text-align:center;color:#64748b;background:#f8fafc}
.input-hint{font-size:.85rem;margin-top:.3rem;text-align:center;opacity:.9;color:#64748b}
.option-group{display:flex;flex-wrap:wrap;gap:1rem;margin:1rem 0}
.option-group label{display:flex;align-items:center;gap:.5rem;padding:.7rem 1.2rem;border:1px solid #cbd5e0;border-radius:6px;cursor:pointer;background:#fff}
.option-group input{position:absolute;opacity:0;width:0;height:0}
.option-group input:checked+span{font-weight:bold;color:#1e40af}
.result{font-weight:bold;background:#f0f7ff;color:#1e40af;position:relative}
.result::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:#1e40af}
.hidden{display:none}
.error-hint{color:#e74c3c;font-size:.95rem;margin:.5rem 0 1rem;height:1.2rem}
.calculator-footer{margin-top:2.5rem;padding-top:1.2rem;border-top:1px dashed #e2e8f0;text-align:center;font-size:.95rem;color:#64748b}

body.dark-mode{background:#141414;color:#fff}
body.dark-mode h1{color:#e50914}
body.dark-mode .calculator{background:#1f1f1f;border-color:#333}
body.dark-mode .section-title{color:#e50914;border-top-color:#333}
body.dark-mode th,body.dark-mode td{border-color:#333}
body.dark-mode th{background:#2d2d2d;color:#bbb}
body.dark-mode input{background:#333;border-color:#444;color:#fff}
body.dark-mode .dimension-group{background:#2d2d2d;border-color:#444}
body.dark-mode .empty-tip{background:#2d2d2d;border-color:#444;color:#999}
body.dark-mode .option-group label{background:#2d2d2d;border-color:#444;color:#fff}
body.dark-mode .option-group input:checked+span{color:#e50914 !important}
body.dark-mode .result{background:#282828;color:#e50914}
body.dark-mode .result::after{background:#e50914}

@media(max-width:768px){.calculator{padding:1.5rem}.button-group{flex-direction:column}.add-btn,.calculate-btn{width:100%}}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">切换主题</button>
<h1>货代成本计算器</h1>
<div class="calculator">
<div class="section-title">基础参数</div>
<div class="error-hint" id="baseError"></div>
<table>
<tr>
<td>总体积(m³)</td>
<td>
<input type="number" id="totalVolume" step="0.0001" placeholder="直接输入总体积" min="0">
<div class="dimension-label"><span>或输入件数及尺寸</span></div>
<div class="volume-container" id="dimensionContainer"><div class="empty-tip" id="emptyTip">点击添加,填写货物规格</div></div>
<div class="button-group">
<button class="add-btn" onclick="addNewDimensionGroup()">添加</button>
<button class="calculate-btn" onclick="calculateTotalVolume()">计算总体积</button>
</div>
</td>
<td>C.W.(计费重量,kg)</td>
<td class="result" id="cw">-</td>
</tr>
<tr>
<td>G.W.(总实际重量,kg)</td>
<td><input type="number" id="gw" step="0.001" placeholder="输入总实际重量" min="0"></td>
<td>重量/体积比(kg/m³)</td>
<td class="result" id="ratio">-</td>
</tr>
<tr>
<td>USD/RMB汇率</td>
<td><input type="number" id="exchangeRate" step="0.0001" value="7.2" min="0.0001"></td>
<td>成本计费重(kg)</td>
<td class="result" id="costWeight">-</td>
</tr>
</table>

<div class="section-title">运输类型</div>
<div class="option-group">
<label><input type="radio" name="billingType" value="0.006" checked><span>大陆</span></label>
<label><input type="radio" name="billingType" value="0.007"><span>香港</span></label>
<label><input type="radio" name="billingType" value="0.005"><span>快件</span></label>
<label><input type="radio" name="billingType" value="0.001"><span>海运</span></label>
</div>

<div class="section-title">分泡比例</div>
<div class="option-group" id="airBubble">
<label><input type="radio" name="bubble" value="0" checked><span>不分泡</span></label>
<label><input type="radio" name="bubble" value="0.5"><span>55分</span></label>
<label><input type="radio" name="bubble" value="0.4"><span>46分</span></label>
<label><input type="radio" name="bubble" value="0.3"><span>37分</span></label>
<label><input type="radio" name="bubble" value="0.2"><span>28分</span></label>
</div>
<div class="option-group hidden" id="otherBubble">
<label><input type="radio" name="bubbleOther" value="0" checked><span>默认不分泡</span></label>
</div>

<div class="section-title">成本计算</div>
<table>
<tr>
<td>成本单价 RMB/KG</td>
<td><input type="number" id="rmbPerKg" step="0.01" placeholder="输入单价或目标价反算" min="0"></td>
<td>分泡后 RMB/KG</td>
<td class="result" id="rmbAfter">-</td>
</tr>
<tr>
<td>成本单价 USD/KG</td>
<td class="result" id="usdPerKg">-</td>
<td>分泡后 USD/KG</td>
<td class="result" id="usdAfter">-</td>
</tr>
<tr>
<td>目标售价 USD/KG</td>
<td><input type="number" id="targetUsdPrice" step="0.01" min="0"></td>
<td>对应成本 RMB/KG</td>
<td class="result" id="targetRmbPrice">-</td>
</tr>
</table>

<div class="section-title">总成本汇总</div>
<table class="total-cost-table">
<tr><td></td><td></td><td>总成本 RMB</td><td class="result" id="totalRMB">-</td></tr>
<tr><td></td><td></td><td>总成本 USD</td><td class="result" id="totalUSD">-</td></tr>
</table>
<div class="calculator-footer">输入参数自动计算，空运/快件/海运一键切换</div>
</div>

<script>
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);

function setupThemeToggle() {
  const toggle = $('themeToggle');
  toggle.onclick = () => {
    document.body.classList.toggle('dark-mode');
  };
}

function initEventListeners() {
  $$('input[name="billingType"]').forEach(radio => radio.addEventListener('change', () => {
    const v = +document.querySelector('input[name="billingType"]:checked').value;
    $('airBubble').classList.toggle('hidden', v === 0.005 || v === 0.001);
    $('otherBubble').classList.toggle('hidden', !(v === 0.005 || v === 0.001));
    refreshCalc();
  }));

  $$('input').forEach(el => {
    const handler = debounce(refreshCalc, 300);
    el.addEventListener(el.type !== 'radio' ? 'input' : 'change', handler);
  });
}

function refreshCalc() {
  $('rmbPerKg').value ? areAllFieldsFilled() && calc() : canReverseCalculate() && reverseCalc();
}

function getBubbleRate() {
  const v = +document.querySelector('input[name="billingType"]:checked').value;
  return v === 0.005 || v === 0.001 ? 0 : +document.querySelector('input[name="bubble"]:checked').value || 0;
}

function canReverseCalculate() {
  const vol = +$('totalVolume').value, gw = +$('gw').value, rate = +$('exchangeRate').value, target = +$('targetUsdPrice').value;
  return vol > 0 && gw > 0 && rate > 0 && target > 0;
}

function reverseCalc() {
  const vol = +$('totalVolume').value, gw = +$('gw').value, rate = +$('exchangeRate').value, target = +$('targetUsdPrice').value;
  const div = +document.querySelector('input[name="billingType"]:checked').value;
  const bubble = getBubbleRate();
  const cw = vol / div, costW = gw + (cw - gw) * bubble;
  const rmb = (target * cw * rate) / costW;

  $('cw').textContent = cw.toFixed(2);
  $('ratio').textContent = (gw / vol).toFixed(4);
  $('costWeight').textContent = costW.toFixed(2);
  $('targetRmbPrice').textContent = rmb.toFixed(2);
  $('usdPerKg').textContent = (rmb / rate).toFixed(4);
  $('rmbAfter').textContent = ((costW * rmb) / cw).toFixed(4);
  $('usdAfter').textContent = target.toFixed(4);
  $('totalRMB').textContent = (costW * rmb).toFixed(2);
  $('totalUSD').textContent = (costW * rmb / rate).toFixed(2);
}

function calc() {
  const vol = +$('totalVolume').value, gw = +$('gw').value, rate = +$('exchangeRate').value, rmb = +$('rmbPerKg').value;
  const div = +document.querySelector('input[name="billingType"]:checked').value;
  const bubble = getBubbleRate();
  const cw = vol / div, costW = gw + (cw - gw) * bubble;
  const usdP = (rmb / rate).toFixed(4);

  $('cw').textContent = cw.toFixed(2);
  $('ratio').textContent = (gw / vol).toFixed(4);
  $('costWeight').textContent = costW.toFixed(2);
  $('usdPerKg').textContent = usdP;
  $('totalRMB').textContent = (costW * rmb).toFixed(2);
  $('totalUSD').textContent = (costW * usdP).toFixed(2);
  $('rmbAfter').textContent = ((costW * rmb) / cw).toFixed(4);
  $('usdAfter').textContent = ((costW * usdP) / cw).toFixed(4);
}

function addNewDimensionGroup() {
  const container = $('dimensionContainer');
  if ($('emptyTip')) $('emptyTip').remove();
  const div = document.createElement('div');
  div.className = 'dimension-group';
  div.innerHTML = `
    <div class="quantity-input"><input type="number" class="dim-quantity" placeholder="件数" min="1" value="1"><div class="input-hint">件数</div></div>
    <div class="dim-length"><input type="number" placeholder="长"><div class="input-hint">长(cm)</div></div>
    <div class="dim-width"><input type="number" placeholder="宽"><div class="input-hint">宽(cm)</div></div>
    <div class="dim-height"><input type="number" placeholder="高"><div class="input-hint">高(cm)</div></div>
    <button onclick="delDim(this)">删除</button>`;
  container.appendChild(div);
}

function delDim(btn) {
  btn.parentElement.remove();
  if (!$('dimensionContainer').children.length) {
    const tip = document.createElement('div');
    tip.className = 'empty-tip';
    tip.id = 'emptyTip';
    tip.textContent = '点击"添加"按钮,开始填写货物规格';
    $('dimensionContainer').appendChild(tip);
  }
  refreshCalc();
}

function calculateTotalVolume() {
  let vol = 0;
  $$('.dimension-group').forEach(g => {
    const q = +g.querySelector('.dim-quantity').value || 0;
    const l = +g.querySelector('.dim-length input').value || 0;
    const w = +g.querySelector('.dim-width input').value || 0;
    const h = +g.querySelector('.dim-height input').value || 0;
    vol += (l * w * h / 1000000) * q;
  });
  $('totalVolume').value = vol.toFixed(4);
  refreshCalc();
}

function areAllFieldsFilled() {
  return +$('totalVolume').value > 0 && +$('gw').value > 0 && +$('exchangeRate').value > 0 && +$('rmbPerKg').value > 0;
}

function debounce(func, delay) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => func.apply(this, args), delay); };
}

window.onload = () => { setupThemeToggle(); initEventListeners(); };
</script>
</body>
</html>
